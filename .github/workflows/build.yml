name: Build and Release

on:
  push:
    tags:
      - 'v*' # Only run the release job when a version tag is pushed

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write # Crucial for uploading to releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This single step replaces the manual Zipping and Uploading
      - name: Build and Publish
        run: pnpm exec electron-builder --${{ matrix.platform }} --publish onTag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Artifact to Action
        uses: actions/upload-artifact@v4
        with:
          # This names the artifact in the GitHub UI (e.g., betterjepp-win)
          name: betterjepp-${{ matrix.platform }}
          # Path to where electron-builder puts the files
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/latest*.yml
          retention-days: 5
